<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Language Translator - Accessible Keyboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="bar">
    <h1><a href="index.html">Accessible Keyboard</a> - Translator</h1>
    <div class="controls">
      <a href="index.html" class="btn">Back to Keyboard</a>
    </div>
  </header>

  <main>
    <div class="card">
      <section class="translator">
        <h3 style="color:var(--primary); margin-bottom:20px;"><i class="fas fa-globe"></i> Language Translator</h3>
        <textarea id="translateInput" rows="5" placeholder="Enter text to translate..."></textarea>
        <div class="translate-controls">
          <select id="translateTarget">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="kn">Kannada</option>
            <option value="ml">Malayalam</option>
            <option value="ta">Tamil</option>
          </select>
          <button id="translateBtn">Translate</button>
          <button id="clearTranslate">Clear</button>
        </div>
        <div id="translateOutput" class="translate-output"></div>
      </section>
    </div>
  </main>

  <footer class="bar muted">
    <small>Translate text between languages.</small>
  </footer>

  <script>
    // Translator functionality
    const elTranslateInput = document.getElementById('translateInput');
    const elTranslateTarget = document.getElementById('translateTarget');
    const elTranslateBtn = document.getElementById('translateBtn');
    const elTranslateOutput = document.getElementById('translateOutput');
    const elClearTranslate = document.getElementById('clearTranslate');

    // Dark mode from localStorage
    const isDarkMode = localStorage.getItem('darkMode') === 'true';
    document.documentElement.classList.toggle('dark', isDarkMode);

    elClearTranslate.onclick = () => {
      elTranslateInput.value = '';
      elTranslateOutput.textContent = '';
    };

    elTranslateBtn.onclick = async () => {
      const text = elTranslateInput.value.trim();
      const target = elTranslateTarget.value;
      if (!text) return;
      try {
        elTranslateBtn.textContent = 'Translating...';
        elTranslateBtn.disabled = true;
        const res = await fetch('/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, target })
        });
        const data = await res.json();
        elTranslateOutput.textContent = data.translated || 'Translation failed';
      } catch (e) {
        elTranslateOutput.textContent = 'Error: ' + e.message;
      } finally {
        elTranslateBtn.textContent = 'Translate';
        elTranslateBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
